## Voron Design VORON2 250/300/350mm Spider TMC2209 UART config

## *** THINGS TO CHANGE/CHECK: ***
## MCU paths                           [mcu] section
## Thermistor types                    [extruder] and [heater_bed] sections - See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types
## Bed sensor_pin                      [heater_bed] section
## Fan pins                            [heater_fan hotend_fan] amd [fan] sections
## Z Endstop Switch location           [safe_z_home] section
## Homing end position                 [gcode_macro G32] section
## Z Endstop Switch  offset for Z0     [stepper_z] section
## Probe points                        [quad_gantry_level] section
## Min & Max gantry corner postions    [quad_gantry_level] section
## PID tune                            [extruder] and [heater_bed] sections
## Fine tune E steps                   [extruder] section
[mcu EBBCan]
canbus_uuid = 8ecd2eb9165b
[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" 
##--------------------------------------------------------------------
#serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_000000000000000000000000-if00
## Uncomment below if you're using the Raspberry uart0 to communicate with Spider
restart_method: command
serial: /dev/ttyAMA0
[include ./klicky-variables.cfg]
[include ./klicky-macros.cfg]
[include mainsail.cfg] 
#[include EBBcan.cfg]
#[include KAMP_Settings.cfg]
[exclude_object]
[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 3000                 #Max 4000
max_z_velocity: 15          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0
#####################################################################
#      X/Y Stepper Settings
#####################################################################
##  Connected to X-MOT (B Motor)
[stepper_x]
step_pin: PE11
dir_pin: PE10
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: EBBCan: PB7
position_min: 0
##--------------------------------------------------------------------
##  Uncomment for 350mm build
position_endstop: 350
position_max: 350
##--------------------------------------------------------------------
homing_speed: 25   #Max 100
homing_retract_dist: 5
homing_positive_dir: true
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_x]
uart_pin: PE7
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
##  Connected to Y-MOT (A Motor)
[stepper_y]
step_pin: PD8
dir_pin: !PB12
enable_pin: !PD9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: ^PA2
position_min: 0
##--------------------------------------------------------------------
##  Uncomment for 350mm build
position_endstop: 355
position_max: 355
##--------------------------------------------------------------------
homing_speed: 25  #Max 100
homing_retract_dist: 5
homing_positive_dir: true
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y]
uart_pin: PE15
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
#####################################################################
#   Z Stepper Settings
#####################################################################
## In Z-MOT Position    Z0 Stepper - Front Left
[stepper_z]
step_pin: PE1
dir_pin: !PE0
enable_pin: !PC5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
##  In Z- Position
endstop_pin: ^PA3
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##  Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: -0.5
##--------------------------------------------------------------------
##  Uncomment below for 350mm build
position_max: 310
##--------------------------------------------------------------------
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PD11
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 99999
##  In E1-MOT Position     Z1 Stepper - Rear Left
[stepper_z1]
step_pin: PD12
dir_pin: PC4
enable_pin: !PE8
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PA15
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 99999
##  In E2-MOT Position     Z2 Stepper - Rear Right
[stepper_z2]
step_pin: PE2
dir_pin: !PE4
enable_pin: !PE3
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PC15
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 99999
##  In E3-MOT Position     Z3 Stepper - Front Right
[stepper_z3]
step_pin: PE6
dir_pin: PC13
enable_pin: !PE5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z3]
uart_pin: PC14
interpolate: False
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 99999
#####################################################################
#   Extruder
#####################################################################
[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 32
##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point
rotation_distance: 22.44
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan: PB13
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
##  Update Gear Ratio depending on your Extruder Type
##  Use 50:10 for Stealthburner/Clockwork 2
##  Use 50:17 for Afterburner/Clockwork (BMG Gear Ratio)
##  Use 80:20 for M4, M3.1
gear_ratio: 50:10
min_temp: 0
max_temp: 340
min_extrude_temp: 200
max_power: 1.0
##  Try to keep pressure_advance below 1.0
pressure_advance: 0.05
##  Default is 0.040, leave stock
pressure_advance_smooth_time: 0.04
#sensor_type: EPCOS 100K B57560G104F
#sensor_pin: EBBCan: PA3
sensor_type:MAX31865
sensor_pin: EBBCan: PA4  # if your can mcu is called something other than EBBCan, change that
spi_bus: spi1
rtd_nominal_r: 1000  # PT1000 should be 1000.  PT100 should be 100
rtd_reference_r: 4300 # PT1000 should be 4300.  PT100 should be 430
rtd_num_of_wires: 2   # This is the number of wires connected to the header.  Either 2 (typical) or 4.
[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.6
interpolate: False
sense_resistor: 0.110
stealthchop_threshold: 0
#####################################################################
#   Bed Heater
#####################################################################
##  SSR Pin - In BED OUT position
[heater_bed]
heater_pin: PB4
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for Keenovo heaters
sensor_type: Generic 3950
##--------------------------------------------------------------------
##  Select the option that matches your board
sensor_pin: PC3 # Spider 1.0 & 1.1
#sensor_pin: PB0 # Spider 2.2
##--------------------------------------------------------------------
##  Adjust max_power so it doesn't exceed the SSR rating. The Omron G3NA-210B-DC5 SSR is rated at 4 amps without a heatsink.
##  The formula is "4 / (Wattage_of_bed_heater / Mains_voltage) = max_power"
##  If max_power is greater than 1.0, use 1.0
max_power: 0.8
min_temp: 0
max_temp: 120
#pwm_cycle_time: 0.02227 #44.9Hz
pwm_cycle_time: 0.02088 #47.9Hz
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769
#####################################################################
#                            Probe                                  #
#####################################################################
## This probe is not used for Z height, only Quad Gantry Leveling  In Z+ position
[probe]
## If your probe is NO instead of NC, change pin to ^!PA3
pin: ^EBBCan: PB5
x_offset: 0
y_offset: 19.75
z_offset: 6.42
speed: 3.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.01
samples_tolerance_retries: 5
#####################################################################
#   Fan Control
#####################################################################
#[fan_generic BedFans]
#pin: PB0
#cycle_time: 0.05
#kick_start_time: 0.5
[fan]
pin: EBBCan: PA1
[heater_fan hotend_fan]
pin: EBBCan: PA0
heater: extruder
heater_temp: 50.0
##  Hotend Fan - FAN0 Connector
#[heater_fan hotend_fan]
##  Select pin for your Spider board
##--------------------------------------------------------------------
#pin: PB0   # Spider 1.0 & 1.1
#pin: PA13  # Spider 2.2
##--------------------------------------------------------------------
#max_power: 1.0
#kick_start_time: 0.5
#heater: extruder
#heater_temp: 50.0
## If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0
## Print Cooling Fan - FAN1 Connector
[fan_generic MCU]
##--------------------------------------------------------------------
pin: PB1   # Spider 1.0 & 1.1
#pin: PA14  # Spider 2.2
##--------------------------------------------------------------------
max_power: 0.5
#kick_start_time: 0.5
## Depending on your fan, you may need to increase this value
## if your fan will not start. Can change cycle_time (increase)
## if your fan is not able to slow down effectively
#off_below: 0.10
## Controller fan - FAN2 Connector
#[heater_fan controller_fan]
#pin: PB2
#kick_start_time: 0.5
#heater: heater_bed
#heater_temp: 45.0
## Exhaust fan - In E2 OUT Positon
#[heater_fan exhaust_fan]
#pin: PB3
#max_power: 1.0
#shutdown_speed: 0.0
#kick_start_time: 0.5
#heater: heater_bed
#heater_temp: 60
#fan_speed: 1.0

[temperature_fan Bedfan]
pin: PB0
#max_power:
#shutdown_speed:
#cycle_time:
#hardware_pwm:
#kick_start_time:
#min_power:
#tachometer_pin:
#tachometer_ppr:
#tachometer_poll_interval:
#enable_pin:
#   See the "fan" section for a description of the above parameters.
sensor_type: Generic 3950
sensor_pin: PC2
#max_delta:
min_temp:20
max_temp:80
#   See the "extruder" section for a description of the above parameters.
pid_Kp: 61.470837
pid_Ki: 0.5
pid_Kd: 0
#   The proportional (pid_Kp), integral (pid_Ki), and derivative
#   (pid_Kd) settings for the PID feedback control system. Kalico
#   evaluates the PID settings with the following general formula:
#     fan_pwm = max_power - (Kp*e + Ki*integral(e) - Kd*derivative(e)) / 255
#   Where "e" is "target_temperature - measured_temperature" and
#   "fan_pwm" is the requested fan rate with 0.0 being full off and
#   1.0 being full on. The pid_Kp, pid_Ki, and pid_Kd parameters must
#   be provided when the PID control algorithm is enabled.
pid_deriv_time: 2.0
#   A time value (in seconds) over which temperature measurements will
#   be smoothed when using the PID control algorithm. This may reduce
#   the impact of measurement noise. The default is 2 seconds.
#target_temp: 30.0
#   A temperature (in Celsius) that will be the target temperature.
#   The default is 40 degrees.
max_speed: 1.0
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when the sensor temperature exceeds the set value.
#   The default is 1.0.
min_speed: 0.0
#   The minimum fan speed (expressed as a value from 0.0 to 1.0) that
#   the fan will be set to for PID temperature fans.
#   The default is 0.3.
#gcode_id:
#   If set, the temperature will be reported in M105 queries using the
#   given id. The default is to not report the temperature via M105.
reverse: True
#   If true, the working mode of the fan is reversed. If the temperature
#   is lower than the target temperature, the fan speed increases;
#   otherwise, the fan speed decreases.
#   The default is False.
control: pid
#points:
  #30.0, 1.0
  #50.0, 0.7
  #60.0, 0.5
  #65.0, 0.3
  #70.0, 0.1
#   A user might defne a list of points which consist of a temperature with
#   it's associated fan speed (temp, fan_speed).
#   The target_temp value defines the temperature at which the fan will run
#   at full speed.
#   The algorithm will use linear interpolation to get the fan speeds
#   between two points (if one has defined 0.0 for 50° and 1.0 for 60° the
#   fan would run with 0.5 at 55°)
#cooling_hysteresis: 0.0
#   define the temperature hysteresis for lowering the fan speed
#   (in simple terms this setting offsets the fan curve when cooling down
#   by the specified amount of degrees celsius. For example, if the
#   hysteresis is set to 5°C, the fan curve will be moved by -5°C. This
#   setting can be used to reduce the effects of quickly changing
#   temperatures around a target temperature which would cause the fan to
#   speed up and slow down repeatedly.)
#heating_hysteresis: 0.0
#   same as cooling_hysteresis but for increasing the fan speed, it is
#   recommended to be left at 0 for safety reasons
[delayed_gcode clear_chamber_on_boot]
initial_duration: 0.5  # Must be before gcode: and greater than 0
gcode:
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=Bedfan TARGET=0
#####################################################################
#                         LED Control                               #
#####################################################################
## Chamber Lighting - In E1 OUT Position
#[output_pin caselight]
#pin: PC8
#pwm: true
#shutdown_value: 0
#cycle_time: 0.01

[idle_timeout]
timeout: 999999

#####################################################################
#                           Temp Sensors                            #
#####################################################################
[temperature_sensor RPi]
sensor_type: temperature_mcu
[temperature_sensor MCU]
sensor_type: temperature_mcu
#[temperature_sensor Chamber]
#sensor_type: Generic 3950
#sensor_pin: PC2
#min_temp: 0
#max_temp: 100
#gcode_id: C
[temperature_sensor Frame]
sensor_type: Generic 3950
sensor_pin: PC1
min_temp: 0
max_temp: 100
gcode_id: F
[temperature_sensor EBB_NTC]
sensor_type: Generic 3950
sensor_pin: EBBCan: PA2
#####################################################################
#                           Testers                                 #
#####################################################################
[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: z,-y,x
[resonance_tester]
probe_points: 175, 176, 20
accel_chip: adxl345
#####################################################################
#   A better print_start macro for v2/trident
#####################################################################

## *** THINGS TO UNCOMMENT: ***
## Bed mesh (2 lines at 2 locations)
## Nevermore (if you have one)
## Z_TILT_ADJUST (For Trident only)
## QUAD_GANTRY_LEVEL (For V2.4 only)
## Beacon Contact logic (if you have one. 4 lines at 4 locations)

[gcode_macro PRINT_START]
gcode:
## This part fetches data from your slicer. Such as bed, extruder, and chamber temps and size of your printer.
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("45")|int %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

##  Uncomment for bed mesh (1 of 2 for bed mesh)
  BED_MESH_CLEAR                                                                                                    # Clear old saved bed mesh (if any)                                 
## Home the printer, set absolute positioning goes to middle turns on PT-fan.
  G28                                                                                                               # Full home (XYZ)
  G90                                                                                                               # Absolute position
## Heating chamber
  SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"                                                                # Display info on display
  G1 X{x_wait} Y{y_wait} Z15 F9000                                                                                  # Go to center of the bed
  M140 S{target_bed|int}                                                                                            # Set the target temp for the bed

  {% if CHAMBER_TEMP > 0 and not printer["heater_generic heater_chamber"].temperature >= CHAMBER_TEMP|float%} #wait for chamber temps
  SET_CHAMBER CHAMBER_TEMP={CHAMBER_TEMP+1} #+1 °C for faster temp target arrival
  M106 S204 #part cooling fan 80%
  TEMPERATURE_WAIT temperature_fan="Bedfan" MINIMUM={CHAMBER_TEMP-0.1} #wait until chamber temp is very nearly reached
  SET_CHAMBER CHAMBER_TEMP={CHAMBER_TEMP} #set correct chamber target and let PID do its magic
  {% endif %}

##in case chamber was already heated
  {% if CHAMBER_TEMP > 0 %}
  ET_CHAMBER CHAMBER_TEMP={CHAMBER_TEMP} 
  {% endif %}

##  Uncomment if you have a Nevermore.
  #SET_PIN PIN=nevermore VALUE=1                                                                                    # Turn on the nevermore
  #{% if FILAMENT_TYPE == "ABS" or FILAMENT_TYPE == "ASA" or FILAMENT_TYPE == "PC" %}
  #SET_FAN_SPEED FAN=Nevermore_micro SPEED=0.6
  #SET_FAN_SPEED FAN=Exhaust SPEED=0.25   
  #{% endif %}

## Heat hotend to 150c. This helps with getting a correct Z-home.
  SET_DISPLAY_TEXT MSG="Hotend: 150c"                                                                               # Display info on display
  M106 S255                                                                                                         # Turn on the PT-fan
  M104 S150                                                                                                         # Heat hotend to 150c

##  Uncomment for V2.4 (Quad gantry level AKA QGL)
  SET_DISPLAY_TEXT MSG="Leveling"                                                                                  # Display info on display
  QUAD_GANTRY_LEVEL                                                                                                 # Level the printer via QGL
  G28 Z                                                                                                             # Home Z again after QGL

##  Uncomment for bed mesh (2 of 2 for bed mesh)
  SET_DISPLAY_TEXT MSG="Bed mesh"                                                                                   # Display info on display
  BED_MESH_CALIBRATE ADAPTIVE=1                                                                                     # Start the bed mesh (add ADAPTIVE=1) for adaptive bed mesh

## Heat up the hotend up to target via data from slicer
  SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"                                                                 # Display info on display
  STATUS_HEATING                                                                                                    # Set LEDs to heating-mode
  G1 X{x_wait} Y{y_wait} Z15 F9000                                                                                  # Go to center of the bed
  M107                                                                                                              # Turn off partcooling fan
  M109 S{target_extruder}                                                                                           # Heat the hotend to set temp

## Get ready to print by doing a primeline and updating the LEDs
  SET_DISPLAY_TEXT MSG="Printer goes brr"                                                                           # Display info on display
  G0 X{x_wait - 50} Y4 F10000                                                                                       # Go to starting point
  G0 Z0.4                                                                                                           # Raise Z to 0.4
  G91                                                                                                               # Incremental positioning 
  G1 X100 E20 F1000                                                                                                 # Primeline
  G90                                                                                                               # Absolute position

[gcode_macro PRINT_END]
## Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
## safe anti-stringing move coords
  {% set th = printer.toolhead %}
  {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
  {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
  {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
  SAVE_GCODE_STATE NAME=STATE_PRINT_END
  M400                           ; wait for buffer to clear
  G92 E0                         ; zero the extruder
  G1 E-5.0 F1800                 ; retract filament
  TURN_OFF_HEATERS
  G90                                      ; absolute positioning
  G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
  G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600  ; park nozzle at rear
  M107                                     ; turn off fan
  BED_MESH_CLEAR
  SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=Bedfan TARGET=0
## The purpose of the SAVE_GCODE_STATE/RESTORE_GCODE_STATE
## command pair is to restore the printer's coordinate system
## and speed settings since the commands above change them.
## However, to prevent any accidental, unintentional toolhead
## moves when restoring the state, explicitly set MOVE=0.
  RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0

[soak_my_bed]
save_dir: /home/pi/printer_data/config/helixscreen/ShakeTune_results/SMB
plot_script_path: /home/pi/printer_data/logs/SMD scripts/plotter.py
# Optional: customize your mesh command (defaults to BED_MESH_CALIBRATE)
mesh_command: BED_MESH_CALIBRATE #METHOD=rapid_scan


[shaketune]
result_folder: /home/pi/printer_data/config/helixscreen/ShakeTune_results
#    Path where the processed results will be stored. If the folder doesn't exist,
#    it will be automatically created. You can change this if you'd like to store 
#    results in a different location.
number_of_results_to_keep: 10
#    This setting defines how many results you want to keep in the result folder.
#    Once the specified number is exceeded, older results will be automatically deleted
#    to free up space on the SD card and avoid cluttering the results folder.
keep_raw_data: True
#    If set to True, Shake&Tune will store both the processed graphs and the raw accelerometer
#    .stdata files in the results folder. This can be useful for debugging or archiving purposes.
#    Please always attach them when reporting any issues on GitHub or Discord.
show_macros_in_webui: True
#    Mainsail and Fluidd doesn't create buttons for system commands (macros that are not part
#    of the printer.cfg file). This option allow Shake&Tune to inject them into the webui at runtime.
#    If set to False, the macros will be hidden but still accessible from the console by typing
#    their names manually, which can be useful if you prefer to encapsulate them into your own macros.
timeout: 600
#    This defines the maximum processing time (in seconds) to allows to Shake&Tune for generating 
#    graphs from a .stdata file. 10 minutes should be more than enough in most cases, but if you have
#    slower hardware (e.g., older SD cards or low-performance devices), increase it to prevent timeouts.
measurements_chunk_size: 2
#    Each Shake&Tune command uses the accelerometer to take multiple measurements. By default,
#    Shake&Tune will write a chunk of data to disk every two measurements, and at the end of the
#    command will merge these chunks into the final .stdata file for processing. "2" is a very
#    conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little
#    RAM, and should work for everyone. However, if you are using a powerful computer, you may
#    wish to increase this value to keep more measurements in memory (e.g., 15-20) before writing
#    the chunk and avoid stressing the filesystem too much.
max_freq: 200
#    This setting defines the maximum frequency at which the calculation of the power spectral density
#    is cutoff. The default value should be fine for most machines and accelerometer combinations and
#    avoid touching it unless you know what you're doing.
dpi: 300
#    Controls the resolution of the generated graphs. The default value of 300 dpi was optimized
#    and strikes a balance between performance and readability, ensuring that graphs are clear
#    without using too much RAM to generate them. Usually, you shouldn't need to change this value.

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True




[neopixel sb_leds]
pin: EBBCan: PD3
# The pin connected to the neopixel. This parameter must be provided.
chain_count: 8
# 8 Rainbow barf + 2 Toolhead
# The number of Neopixel chips that are "daisy chained" to the
# provided pin. The default is 1 (which indicates only a single
# Neopixel is connected to the pin).
color_order: GRB,GRB,GRB,GRB,GRB,GRB,GRB,GRB
# Set the pixel order required by the LED hardware. Options are GRB,
# RGB, GRBW, or RGBW. The default is GRB.
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 0.0
